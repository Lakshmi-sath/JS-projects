<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link rel="icon" href="https://img.icons8.com/?size=100&id=131&format=png&color=000000" />
		<title>Image Search Engine</title>

		<!-- CSS Link -->
		<link rel="stylesheet" href="styles.css" />
	</head>
	<body>
		<h2>Image Search Engine</h2>
		<form id="search-form">
			<svg
				xmlns="http://www.w3.org/2000/svg"
				fill="none"
				viewBox="0 0 24 24"
				stroke-width="3"
				stroke="currentColor"
				class="size-6">
				<path
					stroke-linecap="round"
					stroke-linejoin="round"
					d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z" />
			</svg>
			<input type="text" id="search-box" placeholder="Search here..." autocomplete="off" />
			<button class="search-btn">Search</button>
		</form>
		<div id="search-results"></div>

		<button id="show-more">Show More</button>
		<!--<button id="show-less">Show less</button>-->

		<!-- JS Link -->
		<script src="scripts.js"></script>
	</body>
</html>
