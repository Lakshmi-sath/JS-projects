<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link rel="icon" href="https://img.icons8.com/?size=100&id=69552&format=png&color=000000" />
		<!-- CSS LINK -->
		<link rel="stylesheet" href="styles.css" />
		<!-- GOOGLE FONTS -->
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
			rel="stylesheet" />
		<title>Weather App</title>
	</head>
	<body>
		<div class="card">
			<form id="weather-form">
				<svg
					xmlns="http://www.w3.org/2000/svg"
					fill="none"
					viewBox="0 0 24 24"
					stroke-width="2.5"
					stroke="currentColor"
					class="size-6">
					<path
						stroke-linecap="round"
						stroke-linejoin="round"
						d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z" />
				</svg>
				<input id="input-city" type="text" placeholder="Enter the city here..." spellcheck="false" 
				autocomplete="off"/>
			</form>
			<div class="error">
				<p>Invalid City Name</p>
			</div>
			<div class="weather">
				<img src="images/rain.png" alt="Rainy" class="weather-icon" />
				<h1 class="temp">22°C</h1>
				<h2 class="city">New York</h2>
				<div class="details">
					<div class="col">
						<img src="images/humidity.png" alt="" />
						<div>
							<p class="humidity">50%</p>
							<p>Humidity</p>
						</div>
					</div>
					<div class="col">
						<img src="images/wind.png" alt="" />
						<div>
							<p class="wind">15 km/ph</p>
							<p>Wind Speed</p>
						</div>
					</div>
				</div>
			</div>
		</div>
		<!-- JAVASCRIPT LINK -->
		<script src="scripts.js"></script>
	</body>
</html>
